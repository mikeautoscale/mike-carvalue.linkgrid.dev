<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CarValue — Market Value Estimator</title>
<style>
  :root {
    --bg: #eef1f6;
    --bg-2: #f7f9fc;
    --card: #ffffff;
    --ink: #1f2733;
    --muted: #6b7480;
    --line: #e6e9ef;
    --accent: #2563eb;
    --accent-dark: #1d4ed8;
    --accent-soft: #eef2ff;
    --danger: #b42318;
    --danger-soft: #fef3f2;
    --shadow-sm: 0 1px 2px rgba(16, 24, 40, .06);
    --shadow-lg: 0 18px 40px -16px rgba(16, 24, 40, .25);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
    padding: 48px 20px 80px;
  }

  .page { width: 100%; max-width: 760px; }

  header.brand {
    display: flex;
    align-items: center;
    gap: 14px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .logo {
    width: 44px; height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent) 0%, #4f7cf7 100%);
    display: grid; place-items: center;
    box-shadow: var(--shadow-sm);
  }
  .logo svg { width: 24px; height: 24px; }
  .brand h1 { font-size: 22px; margin: 0; letter-spacing: -.2px; }
  .brand p { margin: 2px 0 0; font-size: 13px; color: var(--muted); }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm), var(--shadow-lg);
    padding: 28px;
  }

  .field { margin-bottom: 18px; }
  .field:last-of-type { margin-bottom: 0; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 7px;
    color: #344054;
  }
  label .opt { font-weight: 500; color: var(--muted); }
  .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }

  input[type="text"], select {
    width: 100%;
    padding: 13px 14px;
    font-size: 15px;
    color: var(--ink);
    border: 1px solid #d7dce3;
    border-radius: var(--radius-sm);
    background: #fff;
    transition: border-color .15s, box-shadow .15s;
  }
  input[type="text"]::placeholder { color: #aab1bb; }
  input[type="text"]:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
  }

  select {
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    background-image: url("data:image/svg+xml;charset=utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236b7480' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 13px center;
    padding-right: 38px;
  }
  select:disabled {
    background-color: #f3f4f6;
    color: #9aa3ad;
    cursor: not-allowed;
    box-shadow: none;
  }

  .row { display: flex; gap: 16px; }
  .row .field { flex: 1; }

  button.submit {
    margin-top: 22px;
    width: 100%;
    padding: 13px 16px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background .15s, transform .05s;
  }
  button.submit:hover:not(:disabled) { background: var(--accent-dark); }
  button.submit:active:not(:disabled) { transform: translateY(1px); }
  button.submit:disabled { opacity: .55; cursor: not-allowed; }

  /* States */
  #status { margin-top: 22px; }
  .message {
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 14px;
    border: 1px solid transparent;
  }
  .message.error { color: var(--danger); background: var(--danger-soft); border-color: #fecdca; }
  .message.empty { color: #475467; background: #f9fafb; border-color: var(--line); }
  .loading { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 14px; padding: 6px 2px; }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid #d7dce3;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Result */
  #result { margin-top: 24px; display: none; }
  .estimate-card {
    text-align: center;
    padding: 26px 20px 28px;
    background: linear-gradient(180deg, var(--accent-soft) 0%, #fff 100%);
    border: 1px solid #e3e8ff;
    border-radius: var(--radius);
  }
  .estimate-label { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .estimate-value { font-size: 46px; font-weight: 700; letter-spacing: -1px; margin: 6px 0 4px; color: var(--ink); }
  .estimate-sub { font-size: 14px; color: #475467; }
  .badges { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
  .badge {
    font-size: 12px; font-weight: 600;
    padding: 5px 11px; border-radius: 999px;
    background: #fff; border: 1px solid var(--line); color: #475467;
  }
  .badge.accent { background: var(--accent); border-color: var(--accent); color: #fff; }

  .listings-wrap { margin-top: 22px; }
  .listings-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
  .listings-head h2 { font-size: 15px; margin: 0; }
  .listings-head span { font-size: 13px; color: var(--muted); }

  .table-scroll {
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    overflow: auto;
    max-height: 440px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead th {
    position: sticky; top: 0;
    background: #f9fafb;
    text-align: left;
    font-size: 12px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: .4px;
    padding: 11px 14px;
    border-bottom: 1px solid var(--line);
  }
  tbody td { padding: 11px 14px; border-bottom: 1px solid #f1f3f7; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #fafbfd; }
  td.num, th.num { text-align: right; white-space: nowrap; }
  .vehicle { color: var(--ink); }
  .muted { color: var(--muted); }

  footer { text-align: center; margin-top: 26px; font-size: 12px; color: var(--muted); }

  @media (max-width: 560px) {
    .row { flex-direction: column; gap: 0; }
    .estimate-value { font-size: 38px; }
    body { padding-top: 32px; }
  }
</style>
</head>
<body>
  <main class="page">
    <header class="brand">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 13l1.6-4.3A2 2 0 016.5 7.4h11a2 2 0 011.9 1.3L21 13v5a1 1 0 01-1 1h-1a1 1 0 01-1-1v-1H6v1a1 1 0 01-1 1H4a1 1 0 01-1-1v-5z"
                stroke="#fff" stroke-width="1.6" stroke-linejoin="round"/>
          <circle cx="7.5" cy="15.5" r="1.1" fill="#fff"/>
          <circle cx="16.5" cy="15.5" r="1.1" fill="#fff"/>
        </svg>
      </div>
      <div>
        <h1>CarValue</h1>
        <p>Estimate a vehicle's market value</p>
      </div>
    </header>

    <section class="card">
      <form id="search-form" novalidate>
        <div class="row">
          <div class="field">
            <label for="year">Year</label>
            <select id="year"><option value="">Select year</option></select>
          </div>
          <div class="field">
            <label for="make">Make</label>
            <select id="make"><option value="">Select make</option></select>
          </div>
        </div>
        <div class="field">
          <label for="model">Model</label>
          <select id="model" disabled><option value="">Select year &amp; make first</option></select>
        </div>
        <div class="field">
          <label for="mileage">Mileage <span class="opt">· optional</span></label>
          <input type="text" id="mileage" name="mileage" placeholder="150,000" autocomplete="off"
                 inputmode="numeric">
          <div class="hint">Adjusts the estimate for wear — higher mileage lowers the value.</div>
        </div>
        <button type="submit" class="submit" id="submit-btn" disabled>Estimate value</button>
      </form>

      <div id="status" aria-live="polite"></div>
    </section>

    <section id="result"></section>

    <footer>Estimates are derived from comparable dealer listings and are for reference only.</footer>
  </main>

<script>
(function () {
  const form = document.getElementById('search-form');
  const yearSel = document.getElementById('year');
  const makeSel = document.getElementById('make');
  const modelSel = document.getElementById('model');
  const mileageInput = document.getElementById('mileage');
  const submitBtn = document.getElementById('submit-btn');
  const statusEl = document.getElementById('status');
  const resultEl = document.getElementById('result');

  const fmtMoney = (n) => '$' + Number(n).toLocaleString('en-US');
  const fmtMiles = (n) => Number(n).toLocaleString('en-US') + ' mi';
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

  async function getJSON(url) {
    const r = await fetch(url, { headers: { 'Accept': 'application/json' } });
    const data = await r.json();
    if (!r.ok) throw new Error((data && data.error) || ('HTTP ' + r.status));
    return data;
  }

  function fillSelect(sel, items, placeholder) {
    sel.innerHTML = '';
    const ph = document.createElement('option');
    ph.value = '';
    ph.textContent = placeholder;
    sel.appendChild(ph);
    for (const it of items) {
      const o = document.createElement('option');
      o.value = String(it);
      o.textContent = String(it);
      sel.appendChild(o);
    }
  }

  function selectionComplete() {
    return Boolean(yearSel.value && makeSel.value && modelSel.value);
  }
  function updateSubmitState() {
    submitBtn.disabled = !selectionComplete();
  }

  function showMessage(kind, text) {
    statusEl.innerHTML = '<div class="message ' + kind + '">' + esc(text) + '</div>';
    resultEl.style.display = 'none';
  }

  function setLoading(on) {
    submitBtn.disabled = on || !selectionComplete();
    submitBtn.textContent = on ? 'Estimating…' : 'Estimate value';
    statusEl.innerHTML = on
      ? '<div class="loading"><span class="spinner"></span> Searching comparable listings…</div>'
      : '';
  }

  async function refreshModels() {
    statusEl.innerHTML = '';
    // Clear the model synchronously so a stale selection can't keep submit enabled.
    const ready = Boolean(yearSel.value && makeSel.value);
    modelSel.disabled = true;
    fillSelect(modelSel, [], ready ? 'Loading models…' : 'Select year & make first');
    updateSubmitState();

    if (!ready) {
      return;
    }

    try {
      const params = new URLSearchParams({ make: makeSel.value, year: yearSel.value });
      const data = await getJSON('/api/models.php?' + params.toString());
      if (!data.models.length) {
        fillSelect(modelSel, [], 'No models for this selection');
        modelSel.disabled = true;
      } else {
        fillSelect(modelSel, data.models, 'Select model');
        modelSel.disabled = false;
      }
    } catch (e) {
      fillSelect(modelSel, [], 'Could not load models');
      modelSel.disabled = true;
    }
    updateSubmitState();
  }

  function methodNote(method) {
    if (method === 'regression') return 'Mileage-adjusted';
    if (method === 'median') return 'Median of comparables';
    return '';
  }

  function renderResult(data) {
    statusEl.innerHTML = '';
    const q = data.query || {};
    const vehicle = [q.year, q.make, q.model].filter(Boolean).join(' ');

    const badges = [];
    badges.push('<span class="badge accent">' + data.sampleCount.toLocaleString('en-US') + ' listings</span>');
    const note = methodNote(data.method);
    if (note) badges.push('<span class="badge">' + esc(note) + '</span>');
    if (q.mileage != null) badges.push('<span class="badge">' + fmtMiles(q.mileage) + '</span>');

    const rows = (data.listings || []).map((l) =>
      '<tr>' +
        '<td class="vehicle">' + esc(l.vehicle) + '</td>' +
        '<td class="num">' + fmtMoney(l.price) + '</td>' +
        '<td class="num">' + (l.mileage != null ? fmtMiles(l.mileage) : '<span class="muted">—</span>') + '</td>' +
        '<td>' + (l.location ? esc(l.location) : '<span class="muted">—</span>') + '</td>' +
      '</tr>'
    ).join('');

    resultEl.innerHTML =
      '<div class="estimate-card">' +
        '<div class="estimate-label">Estimated market value</div>' +
        '<div class="estimate-value">' + fmtMoney(data.estimate) + '</div>' +
        '<div class="estimate-sub">' + esc(vehicle) + '</div>' +
        '<div class="badges">' + badges.join('') + '</div>' +
      '</div>' +
      '<div class="listings-wrap">' +
        '<div class="listings-head">' +
          '<h2>Comparable listings</h2>' +
          '<span>Showing ' + (data.listings || []).length + ' of ' + data.sampleCount.toLocaleString('en-US') + '</span>' +
        '</div>' +
        '<div class="table-scroll"><table>' +
          '<thead><tr>' +
            '<th>Vehicle</th><th class="num">Price</th><th class="num">Mileage</th><th>Location</th>' +
          '</tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table></div>' +
      '</div>';
    resultEl.style.display = 'block';
  }

  // Populate the year and make dropdowns up front; model cascades from them.
  (async function init() {
    try {
      const [yrs, mks] = await Promise.all([getJSON('/api/years.php'), getJSON('/api/makes.php')]);
      fillSelect(yearSel, yrs.years, 'Select year');
      fillSelect(makeSel, mks.makes, 'Select make');
    } catch (e) {
      showMessage('error', 'Could not load search options. Please refresh the page.');
    }
  })();

  yearSel.addEventListener('change', refreshModels);
  makeSel.addEventListener('change', refreshModels);
  modelSel.addEventListener('change', updateSubmitState);

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    if (!selectionComplete()) return;

    const ymm = yearSel.value + ' ' + makeSel.value + ' ' + modelSel.value;
    const params = new URLSearchParams({ ymm });
    const mileage = mileageInput.value.trim();
    if (mileage) params.set('mileage', mileage);

    setLoading(true);
    try {
      const res = await fetch('/api/estimate.php?' + params.toString(), {
        headers: { 'Accept': 'application/json' }
      });
      const data = await res.json();
      setLoading(false);

      if (!res.ok) {
        showMessage('error', data && data.error ? data.error : 'Something went wrong. Please try again.');
        return;
      }
      if (data.estimate === null || data.sampleCount === 0) {
        showMessage('empty', 'No comparable listings found for that selection.');
        return;
      }
      renderResult(data);
    } catch (err) {
      setLoading(false);
      showMessage('error', 'Could not reach the server. Please try again.');
    }
  });
})();
</script>
</body>
</html>
